<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login – 4NF App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#f0f2f5; display:flex; align-items:center; justify-content:center; height:100vh; }
    .card { width:380px; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,.1); }
  </style>
</head>
<body>
  <div class="card p-4">
    <h4 class="text-center mb-1 fw-bold">4NF Optimizer</h4>
    <p class="text-center text-muted small mb-4">E-Commerce App</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert alert-danger py-2 small">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}

    <form action="/auth" method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <input type="text" name="username" class="form-control" placeholder="admin" required>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" name="password" class="form-control" placeholder="1234" required>
      </div>
      <button class="btn btn-primary w-100">Login</button>
    </form>
  </div>
</body>
</html>
